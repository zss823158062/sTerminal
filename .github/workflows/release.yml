name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Install macOS targets for Universal Binary
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Generate release notes
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOGS=$(git log --pretty=format:"- %s" --no-merges -20)
            COMPARE="$(git rev-list --max-parents=0 HEAD | head -1)"
          else
            LOGS=$(git log --pretty=format:"- %s" --no-merges "${PREV_TAG}..HEAD")
            COMPARE="${PREV_TAG}"
          fi
          {
            echo "notes<<ENDOFNOTES"
            echo "## What's Changed"
            echo ""
            echo "$LOGS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${COMPARE}...${{ github.ref_name }}"
            echo "ENDOFNOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'sTerminal ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload portable exe (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cp src-tauri/target/release/s-terminal.exe "sTerminal_${{ github.ref_name }}_portable_x64.exe"
          gh release upload ${{ github.ref_name }} "sTerminal_${{ github.ref_name }}_portable_x64.exe" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
